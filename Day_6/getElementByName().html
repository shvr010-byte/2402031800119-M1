<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="my">
    <button onclick="myFunction()">Try it</button>
    <script>
        function myFunction() {
            var x = document.getElementsByName("my")[0].value;
            alert(x);
        }
    </script>
</body>
</html>
