<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a =Math.pow(2,3);
        document.writeln("<br>" +a);

        var num=Math.random()
        document.writeln("<br>" +num)

        var num1=parseInt(1+Math.random()*100);
        document.writeln("<br>" +num1);

        document.writeln("<br>" + Math.round(2.5));
        document.writeln("<br>" + Math.ceil(2.1));   
        document.writeln("<br>" + Math.floor(2.9));
    </script>
</body>
</html>
