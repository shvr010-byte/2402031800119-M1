<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: white;
            padding: 20px;
        }

        /* Main Grid Container */
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header - spans full width */
        .header {
            grid-column: 1 / 3;
            background-color: #808080;
            padding: 30px;
            border: 3px solid #333;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        /* Main Content Area */
        .main-content {
            background-color: #808080;
            padding: 30px;
            border: 3px solid #333;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        /* Right Sidebar Container */
        .sidebar {
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 15px;
        }

        /* Sidebar Items */
        .sidebar-item {
            background-color: #808080;
            padding: 30px;
            border: 3px solid #333;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }

        /* Footer - spans full width */
        .footer {
            grid-column: 1 / 3;
            background-color: #808080;
            padding: 30px;
            border: 3px solid #333;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">Header</div>

        <!-- Main Content -->
        <div class="main-content">Main Content Area</div>

        <!-- Right Sidebar with 3 Items -->
        <div class="sidebar">
            <div class="sidebar-item">Sidebar Item 1</div>
            <div class="sidebar-item">Sidebar Item 2</div>
            <div class="sidebar-item">Sidebar Item 3</div>
        </div>

        <!-- Footer -->
        <div class="footer">Footer</div>
    </div>
</body>
</html>
