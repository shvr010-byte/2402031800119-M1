<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Default styles for mobile (Mobile-First) */
/* ------------------------------------ */
/* 1. MOBILE FIRST (Default Styles)    */
/* ------------------------------------ */
/* Applies to all devices, optimized for phones */
body {
  font-size: 14px;
  padding: 10px;
}
.grid-layout {
  display: grid;
  grid-template-columns: 1fr; /* Single column for phone */
  gap: 15px;
}

/* ------------------------------------ */
/* 2. TABLET BREAKPOINT                 */
/* ------------------------------------ */
/* Applies to screens 768px wide up to 1023px */
@media screen and (min-width: 768px) {
  body {
    font-size: 16px;
    padding: 20px;
  }
  .grid-layout {
    grid-template-columns: repeat(2, 1fr); /* Two columns for tablet */
  }
}

/* ------------------------------------ */
/* 3. DESKTOP BREAKPOINT                */
/* ------------------------------------ */
/* Applies to screens 1024px wide and larger */
@media screen and (min-width: 1024px) {
  body {
    font-size: 18px;
    padding: 40px;
  }
  .grid-layout {
    grid-template-columns: repeat(4, 1fr); /* Four columns for desktop */
    max-width: 1200px;
    margin: 0 auto; /* Centers content on massive screens */
  }
}


    </style>
</head>
<body>
