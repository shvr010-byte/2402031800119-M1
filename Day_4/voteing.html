<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Chack voting age</h1>
    <label>Enter your age</label>
    <input type="number" id="age"><br><br>  
    <button onclick="document.getElementById('demo').innerHTML=vot(document.getElementById('age').value)">Check</button><br><br>
    <p id="demo"></p>

    <h1>Find positive & negative numbers</h1>
    <label>Enter the number </label>
    <input type="number" id="num"><br><br>
    <button onclick="document.getElementById('demo1').innerHTML=posi(document.getElementById('num').value)">Check</button><br><br>
    <p id="demo1"></p>

    <h1>Gratest number of 3</h1>
    <label>Enter 1st number </label>
    <input type="number" id="num1"><br><br> 
    <label>Enter 2nd number </label>
    <input type="number" id="num2"><br><br>
    <label>Enter 3rd number </label>
    <input type="number" id="num3"><br><br>
    <button onclick="document.getElementById('demo2').innerHTML=greatest(document.getElementById('num1').value, document.getElementById('num2').value, document.getElementById('num3').value)">Check</button><br><br>
    <p id="demo2"></p>

    <h1>check username & password</h1>
    <label>Enter your name</label>
    <input type="text" id="name"><br><br>
    <label>Enter your password</label>
    <input type="password" id="password"><br><br>
    <button onclick="document.getElementById('demo3').innerHTML=checkCredentials(document.getElementById('name').value, document.getElementById('password').value)">Check</button><br><br>
    <p id="demo3"></p>

    <h1>division by 5</h1>
    <label>Enter a number</label>
    <input type="number" id="dividend"><br><br>
    <button onclick="document.getElementById('demo4').innerHTML=divideByFive(document.getElementById('dividend').value)">Check</button><br><br>
    <p id="demo4"></p>

    <h1> Greatest of 2</h1>
    <label>Enter 1st number </label>
    <input type="number" id="num4"><br><br>
    <label>Enter 2nd number </label>
    <input type="number" id="num5"><br><br>
    <button onclick="document.getElementById('demo5').innerHTML=greatestTwo(document.getElementById('num4').value, document.getElementById('num5').value)">Check</button><br><br>
    <p id="demo5"></p>

    <h1>prime number</h1>
    <label>Enter the number </label>
    <input type="number" id="prime"><br><br>
    <button onclick="document.getElementById('demo6').innerHTML=isPrime(document.getElementById('prime').value)">Check</button><br><br>
    <p id="demo6"></p>  

    <h1>Electricity Bill</h1>
    <label>Enter the number of units consumed</label>
    <input type="number" id="units"><br><br>
    <button onclick="document.getElementById('demo7').innerHTML=calculateBill(document.getElementById('units').value)">Calculate Bill</button><br><br>
    <p id="demo7"></p>

    <script>
        function vot(a){
            if(a>=18){
                return "you are eligible for voting";
            }
            else{
                return "you are not eligible for voting";
            }
            
        }
        function posi(a){
            if(a>0){
                return "the number is positive";
            }
            else if(a<0){
                return "the number is negative";
            }
            else{
                return "the number is zero";
            }
        }

        function greatest(a, b, c){
            if(a>b && a>c){
                return a;
            }
            else if(b>a && b>c){
                return b;
            }
            else{
                return c;
            }
        }

        function checkCredentials(name, password){
            const validName = "admin";
            const validPassword = "password123";

            if(name === validName && password === validPassword){
                return "Login successful!";
            }
            else{
                return "Invalid username or password.";
            }
        }
        
        function divideByFive(num){
            if(num % 5 === 0){
                return num + " is divisible by 5.";
            }
            else{
                return num + " is not divisible by 5.";
            }
        }

        function greatestTwo(a, b){
            if(a > b){
                return a + " is greater than " + b;
            }
            else if(b > a){
                return b + " is greater than " + a;
            }
            else{
                return "Both numbers are equal.";
            }
        }
        function isPrime(num){
            if(num <= 1){
                return num + " is not a prime number.";
            }
            for(let i = 2; i < num; i++){
                if(num % i === 0){
                    return num + " is not a prime number.";
                }
            }
            return num + " is a prime number.";
        }
        function calculateBill(units){
            let billAmount;
            if(units <= 100){
                billAmount = units * 0.5;
            }
            else if(units <= 200){
                billAmount = (100 * 0.5) + ((units - 100) * 0.75);
            }
            else if(units <= 300){
                billAmount = (100 * 0.5) + (100 * 0.75) + ((units - 200) * 1.2);
            }
            else{
                billAmount = (100 * 0.5) + (100 * 0.75) + (100 * 1.2) + ((units - 300) * 1.5);
            }
            return "Total Bill Amount: " + billAmount.toFixed(2);
        }
    </script>
</body>
</html>
